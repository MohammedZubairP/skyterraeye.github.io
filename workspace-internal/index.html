<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkSpace Pro — Sky Terra Eye</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    input, select, textarea, button { font-family: inherit; }
    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f5f5f3;
      --color-bg-tertiary: #ebebea;
      --color-bg-info: #e6f1fb;
      --color-bg-success: #eaf3de;
      --color-bg-warning: #faeeda;
      --color-bg-danger: #fcebeb;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b6b6b;
      --color-text-tertiary: #a0a0a0;
      --color-text-info: #185fa5;
      --color-text-success: #3b6d11;
      --color-text-warning: #854f0b;
      --color-text-danger: #a32d2d;
      --color-border: rgba(0,0,0,0.12);
      --color-border-med: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e8e8e6; }
      :root {
        --color-bg-primary: #252525;
        --color-bg-secondary: #1e1e1e;
        --color-bg-tertiary: #2a2a2a;
        --color-bg-info: #0c2a45;
        --color-bg-success: #0f2a06;
        --color-bg-warning: #2d1e04;
        --color-bg-danger: #2d0f0f;
        --color-text-primary: #e8e8e6;
        --color-text-secondary: #999990;
        --color-text-tertiary: #666660;
        --color-text-info: #85b7eb;
        --color-text-success: #97c459;
        --color-text-warning: #ef9f27;
        --color-text-danger: #f09595;
        --color-border: rgba(255,255,255,0.1);
        --color-border-med: rgba(255,255,255,0.18);
      }
    }
    input, select, textarea {
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      border: 0.5px solid var(--color-border-med);
      border-radius: var(--radius-md);
      padding: 7px 10px;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--color-text-info); }
    button { cursor: pointer; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border-med); border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {createElement:h,useState,useEffect,useCallback}=React;

// ── credentials ──────────────────────────────────────────────
const CRED={email:'info@skyterraeye.com',pass:'Alsimt@2026'};

// ── helpers ───────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=d=>{if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}};
const fmtM=n=>'AED '+(Math.round(Number(n)||0)).toLocaleString();
const dBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const isOD=d=>d&&new Date(d)<new Date();
const inits=n=>n?n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
const ACOLS=['#534AB7','#0F6E56','#993C1D','#993556','#185FA5','#854F0B','#A32D2D','#5F5E5A'];
const acol=s=>ACOLS[(s||'a').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%ACOLS.length];

// ── constants ─────────────────────────────────────────────────
const PS={
  quotation_pending:{l:'Quotation Pending',c:'#854F0B',bg:'#FAEEDA'},
  quotation_sent:{l:'Quotation Sent',c:'#185FA5',bg:'#E6F1FB'},
  in_progress:{l:'In Progress',c:'#534AB7',bg:'#EEEDFE'},
  review:{l:'In Review',c:'#0F6E56',bg:'#E1F5EE'},
  follow_up_client:{l:'Follow Up (Client)',c:'#993C1D',bg:'#FAECE7'},
  follow_up_new:{l:'Follow Up (New)',c:'#993556',bg:'#FBEAF0'},
  on_hold:{l:'On Hold',c:'#5F5E5A',bg:'#F1EFE8'},
  completed:{l:'Completed',c:'#3B6D11',bg:'#EAF3DE'},
  cancelled:{l:'Cancelled',c:'#A32D2D',bg:'#FCEBEB'}
};
const PRIO={urgent:{l:'Urgent',c:'#A32D2D'},high:{l:'High',c:'#854F0B'},normal:{l:'Normal',c:'#185FA5'},low:{l:'Low',c:'#888780'}};
const LSTG=['Lead','Prospect','Qualified','Proposal','Negotiation','Client','Inactive'];
const LSCOL={Lead:'#5F5E5A',Prospect:'#185FA5',Qualified:'#0F6E56',Proposal:'#534AB7',Negotiation:'#854F0B',Client:'#3B6D11',Inactive:'#A32D2D'};
const LTYP=['Annual','Sick','Personal','Unpaid'];
const PMTH=['Cash','Bank Transfer','Cheque','Online'];
const DEPTS=['Development','Design','Sales','Marketing','Operations','Finance','HR','Other'];

// ── localStorage persistence ──────────────────────────────────
function ld(k,def=[]){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function sv(k,d){try{localStorage.setItem(k,JSON.stringify(d));}catch{}}

// ── design tokens ─────────────────────────────────────────────
const S={
  card:{background:'var(--color-bg-primary)',border:'0.5px solid var(--color-border)',borderRadius:'var(--radius-lg)',padding:'14px 16px'},
  surf:{background:'var(--color-bg-secondary)',borderRadius:'var(--radius-md)',padding:'10px 14px'},
  btw:{display:'flex',alignItems:'center',justifyContent:'space-between'},
  row:{display:'flex',alignItems:'center',gap:8},
  inp:{width:'100%',padding:'7px 10px',border:'0.5px solid var(--color-border-med)',borderRadius:'var(--radius-md)',background:'var(--color-bg-primary)',color:'var(--color-text-primary)',fontSize:13,boxSizing:'border-box',fontFamily:'inherit'}
};

// ── shared components ─────────────────────────────────────────
function Chip({l,c,bg}){return h('span',{style:{display:'inline-block',padding:'2px 9px',borderRadius:20,fontSize:11,fontWeight:500,color:c||'var(--color-text-secondary)',background:bg||'var(--color-bg-secondary)',whiteSpace:'nowrap'}},l);}

function Av({name,id,sz=28}){const c=acol(id||name||'x');return h('div',{title:name,style:{width:sz,height:sz,borderRadius:'50%',background:c+'22',border:`1.5px solid ${c}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:Math.max(10,Math.round(sz*.36)),fontWeight:500,color:c,flexShrink:0,userSelect:'none'}},inits(name));}

function Btn({ch,onClick,pri,sm,dan,full,style:st={}}){
  return h('button',{onClick,style:{padding:sm?'4px 10px':'6px 14px',borderRadius:'var(--radius-md)',fontSize:sm?11:13,fontWeight:500,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:5,width:full?'100%':undefined,justifyContent:full?'center':undefined,
  ...(pri?{background:'var(--color-text-primary)',color:'var(--color-bg-primary)',border:'none'}:dan?{background:'#FCEBEB',color:'#A32D2D',border:'0.5px solid #F09595'}:{background:'transparent',color:'var(--color-text-primary)',border:'0.5px solid var(--color-border-med)'}),lineHeight:1,...st}},ch);
}

function Inp({label,value,onChange,type='text',opts,ph,req,rows,disabled}){
  let el;
  if(opts)el=h('select',{value,onChange,disabled,style:{...S.inp,background:'var(--color-bg-primary)'}},h('option',{value:''},'— select —'),opts.map(o=>h('option',{key:typeof o==='object'?o.v:o,value:typeof o==='object'?o.v:o},typeof o==='object'?o.l:o)));
  else if(rows)el=h('textarea',{value,onChange,placeholder:ph,required:req,disabled,style:{...S.inp,resize:'vertical',minHeight:rows*24}});
  else el=h('input',{type,value,onChange,placeholder:ph,required:req,disabled,style:S.inp});
  return h('div',{style:{marginBottom:10}},label&&h('label',{style:{display:'block',fontSize:12,color:'var(--color-text-secondary)',marginBottom:3}},label+(req?' *':'')),el);
}

function Tabs2({tabs,active,onChange}){
  return h('div',{style:{display:'flex',borderBottom:'0.5px solid var(--color-border)',marginBottom:14}},
    tabs.map(t=>h('button',{key:t.id,onClick:()=>onChange(t.id),style:{padding:'7px 13px',background:'none',border:'none',borderBottom:active===t.id?'2px solid var(--color-text-primary)':'2px solid transparent',color:active===t.id?'var(--color-text-primary)':'var(--color-text-secondary)',cursor:'pointer',fontSize:13,fontWeight:active===t.id?500:400,marginBottom:-1}},t.l))
  );
}

function Stat({label,val,c}){
  return h('div',{style:{...S.surf,padding:'12px 14px'}},
    h('div',{style:{fontSize:11,color:'var(--color-text-secondary)',marginBottom:4}},label),
    h('div',{style:{fontSize:20,fontWeight:500,color:c||'var(--color-text-primary)'}},val)
  );
}

function Modal2({title,onClose,children,w=580}){
  return h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:1000,padding:'24px 14px',overflowY:'auto'},onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{style:{background:'var(--color-bg-primary)',borderRadius:'var(--radius-lg)',border:'0.5px solid var(--color-border)',width:'100%',maxWidth:w,flexShrink:0,boxShadow:'0 8px 32px rgba(0,0,0,0.18)'}},
      h('div',{style:{...S.btw,padding:'12px 16px',borderBottom:'0.5px solid var(--color-border)'}},
        h('span',{style:{fontWeight:500,fontSize:14}},title),
        h('button',{onClick:onClose,style:{background:'none',border:'none',cursor:'pointer',color:'var(--color-text-secondary)',fontSize:22,lineHeight:1,padding:'0 2px'}},'×')
      ),
      h('div',{style:{padding:'16px'}},children)
    )
  );
}

function TH({cols}){
  return h('thead',{},h('tr',{style:{borderBottom:'0.5px solid var(--color-border-med)'}},
    cols.map(({l,w})=>h('th',{key:l,style:{textAlign:'left',padding:'7px 8px',fontSize:11,color:'var(--color-text-secondary)',fontWeight:500,width:w}},l))
  ));
}

function Bar({pct,c='#7F77DD'}){
  return h('div',{style:{height:6,borderRadius:3,background:'var(--color-bg-tertiary)',overflow:'hidden'}},
    h('div',{style:{width:`${Math.min(100,Math.max(0,pct))}%`,height:'100%',background:c,borderRadius:3}})
  );
}

// ─────────────────────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);

  const submit=()=>{
    if(!email||!pass){setErr('Please enter your email and password.');return;}
    setLoading(true);setErr('');
    setTimeout(()=>{
      if(email.trim().toLowerCase()===CRED.email&&pass===CRED.pass){onLogin();}
      else{setErr('Invalid email or password.');setLoading(false);}
    },500);
  };

  return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--color-bg-secondary)'}},
    h('div',{style:{width:380,background:'var(--color-bg-primary)',border:'0.5px solid var(--color-border)',borderRadius:'var(--radius-lg)',padding:'40px 36px',boxShadow:'0 4px 24px rgba(0,0,0,0.08)'}},
      h('div',{style:{textAlign:'center',marginBottom:32}},
        h('div',{style:{width:52,height:52,borderRadius:14,background:'var(--color-text-primary)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',fontSize:22,color:'var(--color-bg-primary)',fontWeight:600}},'W'),
        h('div',{style:{fontSize:20,fontWeight:600,letterSpacing:'-0.3px'}},'WorkSpace Pro'),
        h('div',{style:{fontSize:13,color:'var(--color-text-secondary)',marginTop:4}},'Sky Terra Eye · Internal System'),
        h('div',{style:{fontSize:10,color:'#854F0B',background:'#FAEEDA',borderRadius:20,padding:'3px 12px',display:'inline-block',marginTop:8,fontWeight:500}},
          '🔒 CONFIDENTIAL — AUTHORIZED ACCESS ONLY'
        )
      ),
      h('div',{style:{marginBottom:14}},
        h('label',{style:{display:'block',fontSize:12,color:'var(--color-text-secondary)',marginBottom:5,fontWeight:500}},'Email Address'),
        h('input',{type:'email',value:email,onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==='Enter'&&submit(),placeholder:'you@skyterraeye.com',autoFocus:true,style:{fontSize:14,padding:'10px 13px'}})
      ),
      h('div',{style:{marginBottom:20}},
        h('label',{style:{display:'block',fontSize:12,color:'var(--color-text-secondary)',marginBottom:5,fontWeight:500}},'Password'),
        h('div',{style:{position:'relative'}},
          h('input',{type:showPass?'text':'password',value:pass,onChange:e=>setPass(e.target.value),onKeyDown:e=>e.key==='Enter'&&submit(),placeholder:'••••••••',style:{fontSize:14,padding:'10px 52px 10px 13px'}}),
          h('button',{onClick:()=>setShowPass(!showPass),style:{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--color-text-secondary)',fontSize:12,padding:0,fontWeight:500}},showPass?'Hide':'Show')
        )
      ),
      err&&h('div',{style:{fontSize:12,color:'#A32D2D',background:'#FCEBEB',border:'0.5px solid #F09595',borderRadius:'var(--radius-md)',padding:'9px 13px',marginBottom:14,textAlign:'center'}},err),
      h('button',{onClick:submit,disabled:loading,style:{width:'100%',padding:'11px',background:loading?'#888':'var(--color-text-primary)',color:'var(--color-bg-primary)',border:'none',borderRadius:'var(--radius-md)',fontSize:14,fontWeight:600,cursor:loading?'default':'pointer',letterSpacing:'0.1px'}},loading?'Signing in…':'Sign In'),
      h('div',{style:{textAlign:'center',marginTop:20,fontSize:11,color:'var(--color-text-tertiary)'}},'© '+new Date().getFullYear()+' Sky Terra Eye. All rights reserved.')
    )
  );
}

// ─────────────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────────────
function Dashboard({clients,projects,team,leaves,invoices,expenses}){
  const hr=new Date().getHours();
  const gr=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const recv=projects.reduce((s,p)=>(p.payments||[]).reduce((a,py)=>a+(+py.amount||0),0)+s,0);
  const pend=projects.reduce((s,p)=>s+((+p.projectValue||0)-((p.payments||[]).reduce((a,py)=>a+(+py.amount||0),0))),0);
  const odFU=projects.filter(p=>p.followUpDate&&isOD(p.followUpDate)&&!['completed','cancelled'].includes(p.status));
  const plv=leaves.filter(l=>l.status==='pending');
  const odInv=invoices.filter(i=>i.status==='sent'&&i.dueDate&&isOD(i.dueDate));
  const recent=[...projects].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);
  const pipeS=LSTG.slice(0,6).map(s=>({s,n:clients.filter(c=>(c.stage||'Lead')===s).length,v:clients.filter(c=>(c.stage||'Lead')===s).reduce((t,c)=>t+(+c.dealValue||0),0)}));
  return h('div',{},
    h('div',{style:{marginBottom:18}},
      h('div',{style:{fontSize:16,fontWeight:600}},gr+', Sky Terra Eye!'),
      h('div',{style:{fontSize:13,color:'var(--color-text-secondary)',marginTop:3}},new Date().toLocaleDateString('en-AE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}))
    ),
    (odFU.length+plv.length+odInv.length)>0&&h('div',{style:{border:'0.5px solid #EF9F27',borderLeft:'3px solid #EF9F27',borderRadius:'var(--radius-md)',background:'#FAEEDA',padding:'10px 14px',marginBottom:16,fontSize:12,color:'#633806'}},
      h('div',{style:{fontWeight:600,marginBottom:4}},'⚠ Attention required'),
      odFU.length>0&&h('div',{},'• '+odFU.length+' overdue follow-up'+(odFU.length>1?'s':'')),
      plv.length>0&&h('div',{},'• '+plv.length+' pending leave request'+(plv.length>1?'s':'')),
      odInv.length>0&&h('div',{},'• '+odInv.length+' overdue invoice'+(odInv.length>1?'s':''))
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:18}},
      h(Stat,{label:'Total Clients',val:clients.length}),
      h(Stat,{label:'Active Projects',val:projects.filter(p=>p.status==='in_progress').length,c:'#534AB7'}),
      h(Stat,{label:'Revenue Received',val:fmtM(recv),c:'#3B6D11'}),
      h(Stat,{label:'Pending Collection',val:fmtM(pend),c:'#854F0B'}),
      h(Stat,{label:'Team Members',val:team.length})
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1.5fr',gap:16}},
      h('div',{style:S.card},
        h('div',{style:{fontWeight:500,fontSize:13,marginBottom:12}},'CRM Pipeline'),
        pipeS.every(s=>s.n===0)
          ?h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',textAlign:'center',padding:'20px 0'}},'No contacts yet')
          :pipeS.filter(s=>s.n>0).map(({s,n,v})=>h('div',{key:s,style:{...S.btw,padding:'6px 0',borderBottom:'0.5px solid var(--color-border)',fontSize:12}},
              h('div',{style:{...S.row,gap:7}},h('div',{style:{width:7,height:7,borderRadius:'50%',background:LSCOL[s]}}),h('span',{},s),h('span',{style:{background:'var(--color-bg-tertiary)',borderRadius:10,padding:'1px 6px',fontSize:10,color:'var(--color-text-secondary)'}},n)),
              v>0&&h('span',{style:{color:'var(--color-text-secondary)',fontSize:11}},fmtM(v))
            ))
      ),
      h('div',{style:S.card},
        h('div',{style:{fontWeight:500,fontSize:13,marginBottom:12}},'Recent Projects'),
        recent.length===0
          ?h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',textAlign:'center',padding:'20px 0'}},'No projects yet')
          :recent.map(p=>{const cl=clients.find(c=>c.id===p.clientId);const st=PS[p.status];
            return h('div',{key:p.id,style:{...S.btw,padding:'7px 0',borderBottom:'0.5px solid var(--color-border)'}},
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.name),
                h('div',{style:{fontSize:11,color:'var(--color-text-secondary)'}},cl?.name||'—')
              ),
              st&&h(Chip,{l:st.l,c:st.c,bg:st.bg})
            );})
      )
    )
  );
}

// ─────────────────────────────────────────────────────────────
// CRM
// ─────────────────────────────────────────────────────────────
function CRM({clients,projects,team,saveClients}){
  const [tab,setTab]=useState('contacts');const[q,setQ]=useState('');const[sf,setSf]=useState('');
  const [modal,setModal]=useState(null);const[edit,setEdit]=useState(null);const[det,setDet]=useState(null);
  const fil=clients.filter(c=>(!q||(c.name+' '+(c.company||'')).toLowerCase().includes(q.toLowerCase()))&&(!sf||c.stage===sf));
  const saveC=data=>{if(edit)saveClients(clients.map(c=>c.id===edit.id?{...c,...data}:c));else saveClients([...clients,{id:uid(),createdAt:new Date().toISOString(),activities:[],...data}]);setModal(null);};
  const addAct=(cid,act)=>{const up=clients.map(c=>c.id===cid?{...c,activities:[...(c.activities||[]),{id:uid(),createdAt:new Date().toISOString(),...act}]}:c);saveClients(up);if(det?.id===cid)setDet(up.find(c=>c.id===cid));};
  return h('div',{style:{position:'relative'}},
    h(Tabs2,{tabs:[{id:'contacts',l:'Contacts ('+clients.length+')'},{id:'pipeline',l:'Sales Pipeline'}],active:tab,onChange:setTab}),
    tab==='contacts'&&h('div',{},
      h('div',{style:{...S.btw,marginBottom:12}},
        h('div',{style:{display:'flex',gap:8}},
          h('input',{value:q,onChange:e=>setQ(e.target.value),placeholder:'Search contacts...',style:{width:200}}),
          h('select',{value:sf,onChange:e=>setSf(e.target.value),style:{width:140}},h('option',{value:''},'All Stages'),LSTG.map(s=>h('option',{key:s,value:s},s)))
        ),
        h(Btn,{ch:'+ Add Contact',pri:true,onClick:()=>{setEdit(null);setModal('form');}})
      ),
      h('div',{style:{...S.card,overflow:'auto'}},
        h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}},
          h(TH,{cols:[{l:'Contact',w:'24%'},{l:'Company',w:'18%'},{l:'Stage',w:'14%'},{l:'Deal Value',w:'13%'},{l:'Follow-up',w:'13%'},{l:'',w:'18%'}]}),
          h('tbody',{},
            fil.length===0&&h('tr',{},h('td',{colSpan:6,style:{textAlign:'center',padding:'24px',color:'var(--color-text-secondary)'}},'No contacts found')),
            fil.map(c=>h('tr',{key:c.id,style:{borderBottom:'0.5px solid var(--color-border)'}},
              h('td',{style:{padding:'9px 8px'}},h('div',{style:{display:'flex',alignItems:'center',gap:8}},h(Av,{name:c.name,id:c.id}),h('div',{},h('div',{style:{fontWeight:500,cursor:'pointer',color:'var(--color-text-info)'},onClick:()=>{setDet(c);setModal('detail');}},c.name),h('div',{style:{fontSize:11,color:'var(--color-text-secondary)',overflow:'hidden',textOverflow:'ellipsis',maxWidth:130}},c.email||'')))),
              h('td',{style:{padding:'9px 8px',fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},c.company||'—'),
              h('td',{style:{padding:'9px 8px'}},h(Chip,{l:c.stage||'Lead',c:LSCOL[c.stage||'Lead'],bg:LSCOL[c.stage||'Lead']+'20'})),
              h('td',{style:{padding:'9px 8px',fontSize:12}},c.dealValue?fmtM(c.dealValue):'—'),

function Reports({clients,projects,team,invoices,expenses}){
  const recv=projects.reduce((s,p)=>(p.payments||[]).reduce((a,py)=>a+(+py.amount||0),0)+s,0);
  const expTot=expenses.reduce((s,e)=>s+(+e.amount||0),0);
  const pend=projects.reduce((s,p)=>s+((+p.projectValue||0)-((p.payments||[]).reduce((a,py)=>a+(+py.amount||0),0))),0);
  const sBd=Object.entries(PS).map(([k,v])=>({...v,key:k,n:projects.filter(p=>p.status===k).length})).filter(s=>s.n>0);
  const maxN=Math.max(...sBd.map(s=>s.n),1);
  const clRev=clients.map(c=>({name:c.name,v:projects.filter(p=>p.clientId===c.id).reduce((s,p)=>(p.payments||[]).reduce((a,py)=>a+(+py.amount||0),0)+s,0)})).filter(c=>c.v>0).sort((a,b)=>b.v-a.v).slice(0,8);
  const maxR=Math.max(...clRev.map(c=>c.v),1);
  const pmBd={};projects.forEach(p=>(p.payments||[]).forEach(py=>{pmBd[py.method]=(pmBd[py.method]||0)+(+py.amount||0);}));
  const depts=[...new Set(team.map(m=>m.department).filter(Boolean))].map(d=>({d,n:team.filter(m=>m.department===d).length}));
  return h('div',{},
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:18}},
      h(Stat,{label:'Revenue Collected',val:fmtM(recv),c:'#3B6D11'}),h(Stat,{label:'Pending Collections',val:fmtM(pend),c:'#854F0B'}),h(Stat,{label:'Total Expenses',val:fmtM(expTot),c:'#A32D2D'}),h(Stat,{label:'Net Revenue',val:fmtM(recv-expTot),c:recv-expTot>=0?'#3B6D11':'#A32D2D'})
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}},
      h('div',{style:S.card},h('div',{style:{fontWeight:500,fontSize:13,marginBottom:12}},'Projects by Status'),sBd.length===0?h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',textAlign:'center',padding:'16px'}},'No data yet'):sBd.map(s=>h('div',{key:s.key,style:{marginBottom:10}},h('div',{style:{...S.btw,fontSize:12,marginBottom:4}},h('span',{},s.l),h('span',{style:{fontWeight:500}},s.n)),h(Bar,{pct:Math.round(s.n/maxN*100),c:s.c})))),
      h('div',{style:S.card},h('div',{style:{fontWeight:500,fontSize:13,marginBottom:12}},'Revenue by Client'),clRev.length===0?h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',textAlign:'center',padding:'16px'}},'No revenue data yet'):clRev.map(c=>h('div',{key:c.name,style:{marginBottom:10}},h('div',{style:{...S.btw,fontSize:12,marginBottom:4}},h('span',{},c.name),h('span',{style:{fontWeight:500,color:'#3B6D11'}},fmtM(c.v))),h(Bar,{pct:Math.round(c.v/maxR*100),c:'#1D9E75'}))))
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},
      h('div',{style:S.card},h('div',{style:{fontWeight:500,fontSize:13,marginBottom:12}},'Payments by Method'),Object.entries(pmBd).length===0?h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',textAlign:'center',padding:'16px'}},'No payment data'):Object.entries(pmBd).map(([m,v])=>h('div',{key:m,style:{...S.btw,padding:'8px 0',borderBottom:'0.5px solid var(--color-border)',fontSize:13}},h('span',{},m),h('span',{style:{fontWeight:500,color:'#3B6D11'}},fmtM(v))))),
      h('div',{style:S.card},h('div',{style:{fontWeight:500,fontSize:13,marginBottom:12}},'Team by Department'),depts.length===0?h('div',{style:{fontSize:12,color:'var(--color-text-secondary)',textAlign:'center',padding:'16px'}},'No team data'):depts.map(({d,n})=>h('div',{key:d,style:{...S.btw,padding:'8px 0',borderBottom:'0.5px solid var(--color-border)',fontSize:13}},h('div',{style:{...S.row,gap:8}},h(Chip,{l:d}),h('span',{style:{color:'var(--color-text-secondary)',fontSize:12}},n+' member'+(n!==1?'s':''))),h('div',{style:{width:60}},h(Bar,{pct:Math.round(n/Math.max(...depts.map(x=>x.n),1)*100),c:'#534AB7'})))))
    )
  );
}

      h('div',{style:{padding:'16px 16px 14px',borderBottom:'0.5px solid var(--color-border)'}},

          h('div',{style:{width:30,height:30,borderRadius:8,background:'var(--color-text-primary)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'var(--color-bg-primary)',fontWeight:600,flexShrink:0}},'W'),
          h('div',{},h('div',{style:{fontSize:13,fontWeight:600,lineHeight:1.2}},'WorkSpace Pro'),h('div',{style:{fontSize:10,color:'var(--color-text-secondary)',marginTop:1}},'Sky Terra Eye'))
        ),
        h('div',{style:{fontSize:10,color:'#854F0B',background:'#FAEEDA',borderRadius:6,padding:'3px 8px',marginTop:8,display:'inline-block',fontWeight:500}},'🔒 CONFIDENTIAL')

      h('nav',{style:{flex:1,padding:'8px 0',overflowY:'auto'}},
        NAV.map(item=>h('button',{key:item.id,onClick:()=>setSec(item.id),style:{width:'100%',textAlign:'left',padding:'9px 16px',display:'flex',alignItems:'center',gap:9,background:sec===item.id?'var(--color-bg-primary)':'transparent',border:'none',borderLeft:sec===item.id?'2.5px solid var(--color-text-primary)':'2.5px solid transparent',color:sec===item.id?'var(--color-text-primary)':'var(--color-text-secondary)',cursor:'pointer',fontSize:13,fontWeight:sec===item.id?600:400,transition:'all 0.1s'}},
          h('span',{style:{fontSize:12,opacity:0.7}},item.icon),
          h('span',{style:{flex:1}},item.label),
          item.badge>0&&h('span',{style:{background:'#FCEBEB',color:'#A32D2D',borderRadius:10,fontSize:10,padding:'1px 6px',fontWeight:600}},item.badge)

        h('div',{style:{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:8}},new Date().toLocaleDateString('en-AE',{weekday:'short',day:'2-digit',month:'short'})),
        h('button',{onClick:()=>{setLoggedIn(false);setData(null);},style:{width:'100%',padding:'7px',fontSize:12,border:'0.5px solid var(--color-border)',borderRadius:'var(--radius-md)',background:'transparent',cursor:'pointer',color:'var(--color-text-secondary)'}},'Sign Out')
